<title>Jhatpat Application Search</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Arial,sans-serif;background:#f0f4f8;min-height:100vh;min-height:-webkit-fill-available}
.header{background:#1a2744;color:white;padding:14px 16px;text-align:center;padding-top:max(14px,env(safe-area-inset-top))}
.header h1{font-size:15px;font-weight:700;letter-spacing:0.5px}
.header p{font-size:11px;opacity:0.7;margin-top:3px}
.live{font-size:10px;opacity:0.55;margin-top:2px;display:flex;align-items:center;justify-content:center;gap:5px}
.dot{width:6px;height:6px;background:#22c55e;border-radius:50%;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.search-wrap{background:white;padding:14px;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.slabel{font-size:11px;color:#64748b;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.srow{display:flex;gap:8px}
.srow input{flex:1;height:46px;font-size:15px;border:1.5px solid #1a2744;border-radius:10px;padding:0 12px;background:#fffde7;color:#1a1a1a;outline:none;font-weight:500}
.srow input:focus{border-color:#2563eb;background:#fff}
.srow button{height:46px;padding:0 20px;background:#1a2744;color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.srow button:active{background:#0f172a;transform:scale(0.97)}
.content{padding:14px;padding-bottom:max(14px,env(safe-area-inset-bottom))}
.empty{text-align:center;padding:50px 16px;color:#94a3b8}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty p{font-size:13px;line-height:1.8}
.loading{text-align:center;padding:40px;color:#1d4ed8;font-size:13px;font-weight:600}
.loading-spin{font-size:30px;display:block;margin-bottom:10px;animation:spin 0.8s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.bigcard{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.bigcard-hdr{background:#1a2744;color:white;padding:14px 16px;text-align:center}
.bigcard-hdr .appno{font-size:19px;font-weight:700;letter-spacing:1.5px}
.bigcard-hdr .gendate{font-size:10px;opacity:0.6;margin-top:4px}
.sec-title{display:flex;align-items:center;gap:8px;padding:9px 14px;font-size:11px;font-weight:700;letter-spacing:0.5px;color:white}
.st-rej{background:#b91c1c}.st-est{background:#b45309}.st-tfr{background:#1d4ed8}.st-pq{background:#7c3aed}.st-base{background:#374151}
.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-left:auto;white-space:nowrap}
.b-red{background:#fee2e2;color:#991b1b}.b-amber{background:#fef3c7;color:#92400e}
.b-blue{background:#dbeafe;color:#1e40af}.b-purple{background:#f3e8ff;color:#6b21a8}.b-gray{background:#f1f5f9;color:#374151}
.field{display:flex;padding:8px 14px;border-bottom:0.5px solid #f1f5f9;gap:10px;align-items:flex-start}
.field:last-child{border-bottom:none}
.fl{font-size:10px;color:#64748b;min-width:90px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;padding-top:2px;flex-shrink:0}
.fv{font-size:12px;color:#1e293b;flex:1;line-height:1.6}
.fv-rem{font-size:11px;font-weight:700;padding:7px 10px;border-radius:6px;white-space:pre-wrap;flex:1;line-height:1.5}
.fv-rem-rej{background:#fff5f5;color:#991b1b;border-left:3px solid #fca5a5}
.fv-rem-est{background:#fffbeb;color:#92400e;border-left:3px solid #fcd34d}
.fv-rem-tfr{background:#eff6ff;color:#1e40af;border-left:3px solid #93c5fd}
.fv-rem-pq{background:#faf5ff;color:#6b21a8;border-left:3px solid #c4b5fd}
.fv-rem-base{background:#f8fafc;color:#475569;border-left:3px solid #cbd5e1}
.fv-rej{font-size:11px;color:#991b1b;background:#fff5f5;padding:8px;border-radius:6px;border-left:3px solid #fca5a5;white-space:pre-wrap;flex:1;line-height:1.5}
.fv-pq{font-size:11px;color:#6b21a8;background:#faf5ff;padding:8px;border-radius:6px;border-left:3px solid #c4b5fd;white-space:pre-wrap;flex:1;line-height:1.5}
.fv-mob{color:#0284c7;font-weight:700;font-size:13px}
.sec-divider{height:1px;background:#e2e8f0}
.pdf-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:50px;background:#16a34a;color:white;border:none;font-size:14px;font-weight:700;cursor:pointer;border-top:1px solid #15803d}
.pdf-btn:active{background:#15803d}
.not-found{background:white;border-radius:12px;padding:28px;text-align:center;color:#dc2626}
.error-box{background:#fff5f5;border:1px solid #fca5a5;border-radius:12px;padding:20px;text-align:center;color:#991b1b;font-size:13px;line-height:1.6}
.install-bar{display:none;background:#1d4ed8;color:white;padding:10px 14px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;align-items:center;justify-content:center;gap:8px}
@media print{
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
  body{background:white !important}
  .header,.search-wrap,.pdf-btn,.install-bar{display:none !important}
  .content{padding:0 !important}
  .bigcard{box-shadow:none !important;border-radius:0 !important;border:1px solid #ccc}
  .bigcard-hdr,.st-rej,.st-est,.st-tfr,.st-pq,.st-base,.badge,.fv-rem,.fv-rej,.fv-pq{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{size:A4 portrait;margin:10mm}
  .print-top{display:block !important}
  .field{padding:5px 14px !important}
}
.print-top{display:none;text-align:center;padding:8px 0 10px;border-bottom:2px solid #1a2744;margin-bottom:10px}
.print-top h2{font-size:13px;color:#1a2744;font-weight:700}
.print-top p{font-size:9px;color:#64748b;margin-top:2px}
</style>
</head>
<body>
<div class="install-bar" id="installBar" onclick="installApp()">
  &#128640; Home Screen par Install karein — App jaisa feel!
</div>
<div class="header">
  <h1>&#9889; JHATPAT APPLICATION SEARCH</h1>
  <p>MVVNL &mdash; Application Status Portal</p>
  <div class="live"><span class="dot"></span> Live Data &mdash; Auto Update</div>
</div>
<div class="search-wrap">
  <div class="slabel">Application Number Daalo</div>
  <div class="srow">
    <input type="text" id="inp" placeholder="e.g. J2032662801" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" inputmode="text"/>
    <button onclick="doSearch()">&#128269; Search</button>
  </div>
</div>
<div class="content" id="result">
  <div class="empty">
    <div class="empty-icon">&#128269;</div>
    <p>Application Number daalo<br>aur Search dabao<br><br>
    <small style="color:#64748b;font-size:11px">Example: J2032662801</small></p>
  </div>
</div>
<script>
var API_URL="https://script.google.com/macros/s/AKfycbx3azGLW85OiQI9soaGvMs0SvWOD0uGIVkfXA8BNPoRh4npmw5vroYhjh7xRLquEkgM/exec";
var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;document.getElementById('installBar').style.display='flex';});
window.addEventListener('appinstalled',function(){document.getElementById('installBar').style.display='none';});
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(function(){deferredPrompt=null;document.getElementById('installBar').style.display='none';});}}
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){});});}
function esc(t){if(!t||t==='nan'||t==='NaN'||t===''||t==='None'||t==='—')return'—';return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mobHtml(m){if(!m||m==='nan'||m==='')return'<span class="fv" style="color:#94a3b8">Not Available</span>';return'<a href="tel:'+m+'" style="text-decoration:none"><span class="fv fv-mob">&#128222; '+m+'</span></a>';}
function row(l,v,c){return'<div class="field"><span class="fl">'+l+'</span><span class="'+(c||'fv')+'">'+v+'</span></div>';}
function rowMob(l,m){return'<div class="field"><span class="fl">'+l+'</span>'+mobHtml(m)+'</div>';}
function getFinalRemark(d){var p=[];if(d.rej&&d.rej.rej_remark)p.push({label:'REJECTED',cls:'fv-rem fv-rem-rej'});if(d.est&&d.est.name&&d.est.name!='nan')p.push({label:'ESTIMATE PENDING',cls:'fv-rem fv-rem-est'});if(d.tfr&&d.tfr.name&&d.tfr.name!='nan')p.push({label:'TFR PENDING',cls:'fv-rem fv-rem-tfr'});if(d.pq&&d.pq.query&&d.pq.query!='nan')p.push({label:'PENDING QUERY',cls:'fv-rem fv-rem-pq'});if(p.length===0)return'<span class="fv-rem fv-rem-base">'+(d.base&&d.base.rem?esc(d.base.rem):'No Remarks')+'</span>';return p.map(function(x){return'<span class="'+x.cls+'">'+x.label+'</span>';}).join('<br style="margin:3px 0">');}
function doSearch(){var v=document.getElementById('inp').value.trim().toUpperCase();var el=document.getElementById('result');if(!v){el.innerHTML='<div class="not-found"><p>Application number enter karein</p></div>';return;}el.innerHTML='<div class="loading"><span class="loading-spin">&#9696;</span>Searching...</div>';fetch(API_URL+'?app='+encodeURIComponent(v)).then(function(r){return r.json();}).then(function(d){renderResult(v,d);}).catch(function(){el.innerHTML='<div class="error-box">&#10060; Data load nahi hua.<br>Internet connection check karo.</div>';});}
function renderResult(v,d){var el=document.getElementById('result');var now=new Date();var ds=now.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});var ts=now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});var hasData=(d.base&&d.base.s)||(d.rej&&d.rej.rej_remark)||(d.est&&d.est.name&&d.est.name!='nan')||(d.tfr&&d.tfr.name&&d.tfr.name!='nan')||(d.pq&&d.pq.query&&d.pq.query!='nan');if(!hasData){el.innerHTML='<div class="not-found"><p>&#10060; Record not found</p><small style="color:#64748b;display:block;margin-top:8px;font-size:12px">Application number check karke dobara try karein</small></div>';return;}
var inner='';
if(d.rej&&d.rej.rej_remark){inner+='<div class="sec-title st-rej">&#10060; 1. REJECTED <span class="badge b-red">REJECTED</span></div>';inner+=row('Name',esc(d.rej.name||d.base.n));inner+=row('Division',esc(d.rej.division));inner+=row('Circle',esc(d.rej.circle));inner+=row('Zone',esc(d.rej.zone));inner+=rowMob('Mobile',d.rej.mobile);inner+=row('Rejection Date',esc(d.rej.rej_date));inner+=row('Rejection Remark',esc(d.rej.rej_remark),'fv fv-rej');inner+='<div class="sec-divider"></div>';}
if(d.est&&d.est.name&&d.est.name!='nan'){inner+='<div class="sec-title st-est">&#128196; 2. ESTIMATE PENDING <span class="badge b-amber">ESTIMATE PENDING</span></div>';inner+=row('Name',esc(d.est.name));inner+=row('Division',esc(d.est.division));inner+=row('Load (KW)',esc(d.est.load));inner+=row('Purpose',esc(d.est.purpose));inner+=rowMob('Mobile',d.est.mobile);inner+=row('Dispatch No.',esc(d.est.dispatch_no));inner+=row('Date',esc(d.est.date));inner+=row('Address',esc(d.est.address));inner+='<div class="sec-divider"></div>';}
if(d.tfr&&d.tfr.name&&d.tfr.name!='nan'){inner+='<div class="sec-title st-tfr">&#128203; 3. TFR PENDING <span class="badge b-blue">TFR PENDING</span></div>';inner+=row('Name',esc(d.tfr.name));inner+=row('Division',esc(d.tfr.division));inner+=row('Load (KW)',esc(d.tfr.load));inner+=row('Purpose',esc(d.tfr.purpose));inner+=rowMob('Mobile',d.tfr.mobile);inner+=row('Process Amt.','Rs. '+esc(d.tfr.process_amt));inner+=row('Pending At',esc(d.tfr.pending_at));inner+=row('Days Pending',esc(d.tfr.days_pending));inner+=row('Address',esc(d.tfr.address));inner+='<div class="sec-divider"></div>';}
if(d.pq&&d.pq.query&&d.pq.query!='nan'){inner+='<div class="sec-title st-pq">&#9888; 4. PENDING QUERY <span class="badge b-purple">PENDING QUERY</span></div>';inner+=row('Name',esc(d.pq.name));inner+=row('District',esc(d.pq.district));inner+=row('Load (KW)',esc(d.pq.load));inner+=row('App Type',esc(d.pq.apptype));inner+=row('Query / Remarks',esc(d.pq.query),'fv fv-pq');inner+='<div class="sec-divider"></div>';}
if(d.base&&d.base.s){var sc='b-gray';if(d.rej&&d.rej.rej_remark)sc='b-red';else if(d.tfr&&d.tfr.name&&d.tfr.name!='nan')sc='b-blue';else if(d.est&&d.est.name&&d.est.name!='nan')sc='b-amber';else if(d.pq&&d.pq.query)sc='b-purple';inner+='<div class="sec-title st-base">&#128203; OVERALL STATUS <span class="badge '+sc+'">'+esc(d.base.s)+'</span></div>';inner+=row('Name',esc(d.base.n));inner+=row('Division',esc(d.base.div));inner+=row('Circle',esc(d.base.cir));inner+=row('Zone',esc(d.base.zone));inner+=row('Load (KW)',esc(d.base.load));inner+=row('Purpose',esc(d.base.pur));inner+='<div class="field"><span class="fl">Final Remarks</span><div style="flex:1;display:flex;flex-direction:column;gap:4px">'+getFinalRemark(d)+'</div></div>';inner+=row('Address',esc(d.base.addr));}
el.innerHTML='<div class="print-top"><h2>JHATPAT APPLICATION DETAIL REPORT</h2><p>Generated: '+ds+' '+ts+' | App No: '+v+'</p></div><div class="bigcard"><div class="bigcard-hdr"><div class="appno">'+v+'</div><div class="gendate">Generated: '+ds+' at '+ts+'</div></div>'+inner+'<button class="pdf-btn" onclick="window.print()">&#128436; &nbsp;Save as PDF (A4)</button></div>';}
document.getElementById('inp').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
</script>
</body>
</html>
